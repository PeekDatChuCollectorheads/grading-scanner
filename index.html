<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grading Arbitrage Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a25; --border: #2a2a3a;
  --text: #e8e8f0; --text-dim: #8888a0; --accent: #00e5a0; --accent-dim: #00e5a033;
  --red: #ff4466; --red-dim: #ff446633; --yellow: #ffcc00; --yellow-dim: #ffcc0033; --blue: #4488ff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;font-size:13px}
.header{padding:24px 24px 16px;border-bottom:1px solid var(--border)}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent);line-height:1}
.header .subtitle{font-family:'Syne',sans-serif;font-size:12px;color:var(--text-dim);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.controls{padding:16px 24px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;border-bottom:1px solid var(--border);background:var(--surface)}
.control-group{display:flex;flex-direction:column;gap:4px}
.control-group label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-family:'Syne',sans-serif}
select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;font-family:'Space Mono',monospace;font-size:12px;border-radius:4px;outline:none;cursor:pointer;min-width:140px}
select:focus{border-color:var(--accent)}
.btn{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;border:none;padding:9px 20px;border-radius:4px;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent)}

/* Multi-select dropdown */
.multiselect{position:relative;min-width:220px}
.multiselect-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 28px 8px 12px;font-family:'Space Mono',monospace;font-size:12px;border-radius:4px;cursor:pointer;width:100%;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}
.multiselect-btn::after{content:"▾";position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:10px}
.multiselect-btn:focus{border-color:var(--accent);outline:none}
.multiselect-list{display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;max-height:280px;overflow-y:auto;z-index:200;box-shadow:0 8px 20px rgba(0,0,0,.5)}
.multiselect.open .multiselect-list{display:block}
.multiselect-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:12px;transition:background .1s;font-family:'Space Mono',monospace}
.multiselect-item:hover{background:var(--surface)}
.multiselect-item.disabled{opacity:.35;cursor:not-allowed}
.multiselect-item input[type=checkbox]{accent-color:var(--accent);cursor:pointer;width:14px;height:14px}
.multiselect-item.disabled input{cursor:not-allowed}
.multiselect-max{padding:6px 12px;font-size:10px;color:var(--yellow);font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.5px;border-top:1px solid var(--border)}

.status-bar{padding:10px 24px;font-size:11px;color:var(--text-dim);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;width:200px}
.progress-fill{height:100%;background:var(--accent);transition:width .3s;width:0%}
.results{padding:16px 24px}
.card-grid{display:grid;gap:2px}
.section-header{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:1px;padding:16px 0 8px;color:var(--accent);border-bottom:1px solid var(--border);margin-bottom:4px}
.section-header.psa-header{color:var(--blue)}
.card-row{display:grid;grid-template-columns:32px 60px 1fr 90px 100px 100px 80px 80px;align-items:center;padding:10px 12px;background:var(--surface);border-left:3px solid transparent;transition:background .1s;gap:8px}
.card-row:hover{background:var(--surface2)}
.card-row.tier-s{border-left-color:var(--accent)}
.card-row.tier-a{border-left-color:var(--blue)}
.card-row.tier-b{border-left-color:var(--yellow)}
.card-row.tier-c{border-left-color:var(--text-dim)}
.card-row.tier-avoid{border-left-color:var(--red)}
.card-row-header{display:grid;grid-template-columns:32px 60px 1fr 90px 100px 100px 80px 80px;padding:8px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-family:'Syne',sans-serif;font-weight:600;gap:8px;border-bottom:1px solid var(--border)}
.rank{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text-dim)}
.card-img{width:48px;height:67px;border-radius:3px;object-fit:cover;background:var(--surface2)}
.card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;line-height:1.2}
.card-meta{font-size:10px;color:var(--text-dim);margin-top:2px}
.price{font-weight:700}
.spread-positive{color:var(--accent);font-weight:700}
.spread-negative{color:var(--red);font-weight:700}
.spread-neutral{color:var(--yellow);font-weight:700}
.confidence-high{color:var(--accent)}.confidence-medium{color:var(--yellow)}.confidence-low{color:var(--red)}
.tag{font-size:9px;padding:2px 6px;border-radius:2px;text-transform:uppercase;letter-spacing:.5px;font-family:'Syne',sans-serif;font-weight:600;display:inline-block}
.tag-sir{background:var(--accent-dim);color:var(--accent)}
.tag-ir{background:var(--yellow-dim);color:var(--yellow)}
.tag-holo{background:var(--blue);color:#fff;opacity:.7}
.summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;padding:16px 24px;border-bottom:1px solid var(--border)}
.summary-card{background:var(--surface);padding:14px 16px;border-radius:4px;border:1px solid var(--border)}
.summary-card .label{font-family:'Syne',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:4px}
.summary-card .value{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px}
.summary-card .detail{font-size:10px;color:var(--text-dim);margin-top:2px}
.footer-notes{padding:20px 24px;border-top:1px solid var(--border);margin-top:8px}
.footer-notes h3{font-family:'Syne',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:10px}
.footer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.footer-section{background:var(--surface);padding:14px 16px;border-radius:4px;border:1px solid var(--border)}
.footer-section h4{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:8px}
.footer-section p,.footer-section li{font-size:11px;color:var(--text-dim);line-height:1.6}
.footer-section ul{list-style:none;padding:0}
.footer-section ul li::before{content:">";color:var(--accent);margin-right:6px;font-weight:700}
.empty-state{text-align:center;padding:80px 24px;color:var(--text-dim)}
.empty-state h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text);margin-bottom:8px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:var(--red)}
@media(max-width:900px){
  .card-row,.card-row-header{grid-template-columns:28px 1fr 70px 80px 70px}
  .card-row .card-img-cell,.card-row-header .col-img,.card-row .col-confidence,.card-row-header .col-confidence-h,.card-row .col-sales,.card-row-header .col-sales-h{display:none}
}
@media(max-width:600px){
  .header h1{font-size:24px}.controls{flex-direction:column}select,.multiselect{min-width:100%}
  .card-row,.card-row-header{grid-template-columns:28px 1fr 65px 60px;font-size:11px}
}
</style>
</head>

// ── Derive series list sorted newest-first, Promo Sets on top ──
const seriesMeta = {};
for (const [sid, s] of Object.entries(SETS_RAW)) {
  const sd = s.sd;
  if (!seriesMeta[sd] || s.rd > seriesMeta[sd]) seriesMeta[sd] = s.rd;
}
const seriesOrder = Object.keys(seriesMeta)
  .filter(s => s !== 'Promo Sets')
  .sort((a, b) => seriesMeta[b].localeCompare(seriesMeta[a]));
if (seriesMeta['Promo Sets']) seriesOrder.unshift('Promo Sets');

  const opt = document.createElement('option');
  opt.value = s;
  opt.textContent = s;
  seriesSelect.appendChild(opt);
});

// ── Multi-select Set dropdown ──
const MAX_SETS = 5;
let selectedSetIds = [];

function getSetsForSeries(series) {
  if (!series) return [];
  return Object.entries(SETS_RAW)
    .filter(([_, s]) => s.sd === series)
    .sort((a, b) => {
      const d = a[1].rd.localeCompare(b[1].rd);
      return d !== 0 ? d : a[1].sn.localeCompare(b[1].sn);
    });
}

function updateSetDropdown() {
  const series = seriesSelect.value;
  const setList = document.getElementById('setList');
  const available = getSetsForSeries(series);

  selectedSetIds = selectedSetIds.filter(id => available.some(([sid]) => sid === id));

  let html = '';
  if (available.length === 0) {
    html = '<div style="padding:10px 12px;color:var(--text-dim);font-size:11px">No sets in this series</div>';
  } else {
    available.forEach(([sid, s]) => {
      const checked = selectedSetIds.includes(sid);
      const atMax = selectedSetIds.length >= MAX_SETS && !checked;
      html += '<label class="multiselect-item' + (atMax ? ' disabled' : '') + '">' +
        '<input type="checkbox" value="' + sid + '"' + (checked ? ' checked' : '') + (atMax ? ' disabled' : '') + '>' +
        '<span>' + s.sn + '</span></label>';
    });
    if (selectedSetIds.length >= MAX_SETS) {
      html += '<div class="multiselect-max">Maximum 5 sets selected</div>';
    }
  }
  setList.innerHTML = html;
  updateSetBtnText();

  // Bind checkbox events
  setList.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', function(e) {
      const sid = this.value;
      if (this.checked) {
        if (selectedSetIds.length < MAX_SETS) selectedSetIds.push(sid);
        else { this.checked = false; return; }
      } else {
        selectedSetIds = selectedSetIds.filter(id => id !== sid);
      }
      updateSetDropdown();
    });
  });
}

function updateSetBtnText() {
  const btn = document.getElementById('setBtn');
  if (selectedSetIds.length === 0) btn.textContent = 'Select sets';
  else if (selectedSetIds.length <= 2) btn.textContent = selectedSetIds.map(id => SETS_RAW[id].sn).join(', ');
  else btn.textContent = selectedSetIds.length + ' Sets Selected';
}

seriesSelect.addEventListener('change', () => { selectedSetIds = []; updateSetDropdown(); });

const msEl = document.getElementById('setMultiselect');
document.getElementById('setBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  msEl.classList.toggle('open');
});
document.addEventListener('click', (e) => {

// ── API ──
async function apiCall(endpoint, params) {
  const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(v)).join('&');
  const url = API_BASE + endpoint + '?' + qs;
  const resp = await fetch(url);
  const text = await resp.text();
  if (!resp.ok) throw new Error('API error ' + resp.status);
  return JSON.parse(text);
}

// ── Status ──
function showStatus(t, p) {
  const b = document.getElementById('statusBar'); b.style.display = 'flex';
  document.getElementById('statusText').innerHTML = '<span class="spinner"></span> ' + t;
  if (p !== undefined) document.getElementById('progressFill').style.width = p + '%';
}
function hideStatus() { document.getElementById('statusBar').style.display = 'none'; }
function showError(m) { document.getElementById('statusBar').style.display = 'flex'; document.getElementById('statusText').innerHTML = '<span class="error">' + m + '</span>'; }

// ── Price helpers ──
function getGradedPrice(d) {
  if (!d) return null;
  if (d.smartMarketPrice && d.smartMarketPrice.price != null && d.smartMarketPrice.daysUsed === 30) return d.smartMarketPrice.price;
  return d.medianPrice ?? d.averagePrice ?? null;
}
function getConfidence(d) {
  if (!d) return null;
  if (d.smartMarketPrice && d.smartMarketPrice.price != null && d.smartMarketPrice.daysUsed === 30) return d.smartMarketPrice.confidence || null;
  return null;
}

// ── Scan ──
async function scanSetById(sid) {
  const setData = SETS_RAW[sid];
  const entries = Object.entries(setData.c);
  const results = [];
  const batch = 5;

  for (let i = 0; i < entries.length; i += batch) {
    const b = entries.slice(i, i + batch);
    showStatus(setData.sn + ': ' + Math.min(i+batch, entries.length) + '/' + entries.length, Math.round(i/entries.length*100));

    const promises = b.map(async ([cn, info]) => {
      try {
        const data = await apiCall('/cards', {
          search: info.n + ' ' + cn,
          set: setData.sn,
          includeEbay: 'true',
          days: '90',
          limit: '5'
        });

        let card = null;
        if (!data || !data.data) return { name:info.n, cardNumber:cn, rarity:info.r, setName:setData.sn, rawNM:null, cgc10:null, psa10:null };

        if (Array.isArray(data.data)) {
          card = data.data.find(c => c.cardNumber === cn || (c.cardNumber && c.cardNumber.split('/')[0] === cn));
          if (!card && data.data.length > 0) card = data.data[0];
        } else card = data.data;

        if (!card) return { name:info.n, cardNumber:cn, rarity:info.r, setName:setData.sn, rawNM:null, cgc10:null, psa10:null };

        const rawNM = card.prices?.market ?? null;
        const grades = card.ebay?.salesByGrade;
        const cgc10Data = grades?.cgc10 || null;
        const psa10Data = grades?.psa10 || null;
        const cgc10 = getGradedPrice(cgc10Data);
        const psa10 = getGradedPrice(psa10Data);

        let cgcSpread=null,cgcPct=null,psaSpread=null,psaPct=null;
        if (rawNM && cgc10) { cgcSpread=cgc10-rawNM; cgcPct=(cgcSpread/rawNM)*100; }
        if (rawNM && psa10) { psaSpread=psa10-rawNM; psaPct=(psaSpread/rawNM)*100; }

        return {
          name:info.n, cardNumber:cn, rarity:info.r, setName:setData.sn, rawNM,
          cgc10, cgcSpread, cgcSpreadPct:cgcPct, cgc10Confidence:getConfidence(cgc10Data), cgc10Sales:cgc10Data?.count||0,
          psa10, psaSpread, psaSpreadPct:psaPct, psa10Confidence:getConfidence(psa10Data), psa10Sales:psa10Data?.count||0,
          image:card.imageCdnUrl200||card.imageCdnUrl400||null,
          ebayGrades:grades?Object.keys(grades):[]
        };
      } catch(e) {
        console.error('Error:', info.n, e);
        return { name:info.n, cardNumber:cn, rarity:info.r, setName:setData.sn, rawNM:null, cgc10:null, psa10:null, error:e.message };
      }
    });

    results.push(...(await Promise.all(promises)).filter(Boolean));
    if (i + batch < entries.length) await new Promise(r => setTimeout(r, 500));
  }
  return results;
}

async function scanSelected() {
  if (selectedSetIds.length === 0) { alert('Select at least one set'); return; }
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('scanAllBtn').disabled = true;
  const all = [];
  try {
    for (let i = 0; i < selectedSetIds.length; i++) {
      const r = await scanSetById(selectedSetIds[i]);
      all.push(...r);
    }
    showStatus('Complete: ' + all.length + ' cards', 100);
    setTimeout(hideStatus, 2000);
    renderResults(all);
  } catch(e) { showError('Failed: ' + e.message); }
  finally { document.getElementById('scanBtn').disabled = false; document.getElementById('scanAllBtn').disabled = false; }
}

async function scanAll() {
  const series = seriesSelect.value;
  if (!series) { alert('Select a series first'); return; }
  const setsInSeries = getSetsForSeries(series).map(([sid]) => sid);
  if (setsInSeries.length === 0) { alert('No sets in this series'); return; }
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('scanAllBtn').disabled = true;
  const all = [];
  try {
    for (let i = 0; i < setsInSeries.length; i++) {
      const r = await scanSetById(setsInSeries[i]);
      all.push(...r);
    }
    showStatus('Complete: ' + all.length + ' cards across ' + setsInSeries.length + ' sets', 100);
    setTimeout(hideStatus, 2000);
    renderResults(all);
  } catch(e) { showError('Failed: ' + e.message); }
  finally { document.getElementById('scanBtn').disabled = false; document.getElementById('scanAllBtn').disabled = false; }
}

// ── Render ──
function getTier(p){if(p===null)return'tier-c';if(p>=100)return'tier-s';if(p>=50)return'tier-a';if(p>=20)return'tier-b';if(p>=0)return'tier-c';return'tier-avoid'}

function renderCardRow(r, i, gk) {
  const graded = gk==='psa'?r.psa10:r.cgc10;
  const spread = gk==='psa'?r.psaSpread:r.cgcSpread;
  const pct = gk==='psa'?r.psaSpreadPct:r.cgcSpreadPct;
  const conf = gk==='psa'?r.psa10Confidence:r.cgc10Confidence;
  const sales = gk==='psa'?r.psa10Sales:r.cgc10Sales;
  const tier = getTier(pct);
  const ss = pct!==null?(pct>0?'+':'')+pct.toFixed(1)+'%':'N/A';
  const sc = pct===null?'':pct>=50?'spread-positive':pct>=0?'spread-neutral':'spread-negative';
  const sd = spread!==null?'$'+Math.abs(spread).toFixed(0):'';
  const tagClass = r.rarity==='SIR'?'tag-sir':r.rarity==='IR'?'tag-ir':'tag-holo';

  return '<div class="card-row '+tier+'">'+
    '<div class="rank">'+(i+1)+'</div>'+
    '<div class="card-img-cell">'+(r.image?'<img class="card-img" src="'+r.image+'" alt="'+r.name+'" loading="lazy">':'<div class="card-img"></div>')+'</div>'+
    '<div><div class="card-name">'+r.name+'</div><div class="card-meta">'+r.cardNumber+' &middot; <span class="tag '+tagClass+'">'+r.rarity+'</span> &middot; '+r.setName+'</div></div>'+
    '<div class="price">'+(r.rawNM?'$'+r.rawNM.toFixed(2):'<span class="error">N/A</span>')+'</div>'+
    '<div class="price">'+(graded?'$'+graded.toFixed(2):'<span style="color:var(--text-dim)">No data</span>')+'</div>'+
    '<div><span class="'+sc+'">'+ss+'</span>'+(sd?'<br><span style="font-size:10px;color:var(--text-dim)">'+sd+'</span>':'')+'</div>'+
    '<div class="col-confidence">'+(conf?'<span class="confidence-'+conf+'">'+conf+'</span>':'<span style="color:var(--text-dim)">--</span>')+'</div>'+
    '<div class="col-sales">'+(sales>0?sales:'<span style="color:var(--text-dim)">0</span>')+'</div></div>';
}

function renderHeader(gl){return'<div class="card-row-header"><div>#</div><div class="col-img"></div><div>Card</div><div>Raw NM</div><div>'+gl+'</div><div>Spread</div><div class="col-confidence-h">Conf.</div><div class="col-sales-h">Sales</div></div>'}

function calcStats(arr, k) {
  const wd = arr.filter(r => (k==='psa'?r.psaSpreadPct:r.cgcSpreadPct)!==null);
  const avg = wd.length?wd.reduce((s,r)=>s+(k==='psa'?r.psaSpreadPct:r.cgcSpreadPct),0)/wd.length:0;
  let top=null; wd.forEach(r=>{const p=k==='psa'?r.psaSpreadPct:r.cgcSpreadPct;if(!top||p>(k==='psa'?top.psaSpreadPct:top.cgcSpreadPct))top=r});
  const nd = arr.filter(r=>(k==='psa'?r.psa10:r.cgc10)===null);
  return{total:arr.length,withData:wd.length,avg,top,noData:nd.length};
}

function renderSummary(st, topName, topPct, label) {
  const pre = label?'<div style="font-family:Syne,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);padding:16px 24px 0">'+label+'</div>':'';
  return pre+'<div class="summary-bar">'+
    '<div class="summary-card"><div class="label">Cards Scanned</div><div class="value">'+st.total+'</div><div class="detail">'+st.withData+' with graded data</div></div>'+
    '<div class="summary-card"><div class="label">Avg Spread</div><div class="value" style="color:'+(st.avg>0?'var(--accent)':'var(--red)')+'">'+(st.avg>0?'+':'')+st.avg.toFixed(1)+'%</div><div class="detail">Raw NM to Graded 10</div></div>'+
    '<div class="summary-card"><div class="label">Top Opportunity</div><div class="value" style="color:var(--accent)">'+topName+'</div><div class="detail">'+topPct+' spread</div></div>'+
    '<div class="summary-card"><div class="label">No Graded Data</div><div class="value" style="color:'+(st.noData>0?'var(--yellow)':'var(--text-dim)')+'">'+st.noData+'</div><div class="detail">'+(st.noData>0?'Insufficient data':'All have data')+'</div></div></div>';
}

function sortBySpread(arr, k) {
  return [...arr].sort((a,b)=>{
    const av=k==='psa'?a.psaSpreadPct:a.cgcSpreadPct;
    const bv=k==='psa'?b.psaSpreadPct:b.cgcSpreadPct;
    if(av===null&&bv===null)return 0;if(av===null)return 1;if(bv===null)return -1;return bv-av;
  });
}

function renderResults(results) {
  const grader = document.getElementById('graderSelect').value;
  let html = '';

  if (grader==='cgc'||grader==='both') {
    const sorted = sortBySpread(results,'cgc');
    const st = calcStats(results,'cgc');
    const tn = st.top?st.top.name:'N/A';
    const tp = st.top?'+'+st.top.cgcSpreadPct.toFixed(1)+'%':'';
    document.getElementById('summaryArea').innerHTML = renderSummary(st,tn,tp,grader==='both'?'CGC 10':null);
    html += '<div class="results">';
    if (grader==='both') html += '<div class="section-header">CGC 10 Spread</div>';
    html += renderHeader('CGC 10') + '<div class="card-grid">';
    sorted.forEach((r,i) => html += renderCardRow(r,i,'cgc'));
    html += '</div>';

    if (grader==='both') {
      const ps = sortBySpread(results,'psa');
      const pst = calcStats(results,'psa');
      document.getElementById('summaryArea').innerHTML += renderSummary(pst,pst.top?pst.top.name:'N/A',pst.top?'+'+pst.top.psaSpreadPct.toFixed(1)+'%':'','PSA 10');
      html += '<div class="section-header psa-header" style="margin-top:24px">PSA 10 Spread</div>';
      html += renderHeader('PSA 10') + '<div class="card-grid">';
      ps.forEach((r,i) => html += renderCardRow(r,i,'psa'));
      html += '</div>';
    }
    html += '</div>';
  } else {
    const sorted = sortBySpread(results,'psa');
    const st = calcStats(results,'psa');
    document.getElementById('summaryArea').innerHTML = renderSummary(st,st.top?st.top.name:'N/A',st.top?'+'+st.top.psaSpreadPct.toFixed(1)+'%':'',null);
    html += '<div class="results">'+renderHeader('PSA 10')+'<div class="card-grid">';
    sorted.forEach((r,i) => html += renderCardRow(r,i,'psa'));
    html += '</div></div>';
  }

  document.getElementById('resultsArea').innerHTML = html;
  renderFooter(results);
}

function renderFooter(results) {
  const allGrades = new Set();
  results.forEach(r=>{if(r.ebayGrades)r.ebayGrades.forEach(g=>allGrades.add(g))});
  document.getElementById('footerArea').innerHTML =
    '<div class="footer-notes"><h3>Scan Analysis</h3><div class="footer-grid">'+
    '<div class="footer-section"><h4>Tier Legend</h4><ul><li><span style="color:var(--accent)">S</span> = 100%+</li><li><span style="color:var(--blue)">A</span> = 50-99%</li><li><span style="color:var(--yellow)">B</span> = 20-49%</li><li><span style="color:var(--text-dim)">C</span> = 0-19%</li><li><span style="color:var(--red)">Avoid</span> = negative</li></ul></div>'+
    '<div class="footer-section"><h4>Data Notes</h4><ul><li>Graded 10 = eBay sold (90 day window)</li><li>30-day smart price first, then median, then avg</li><li>Raw NM = TCGPlayer market price</li></ul></div>'+
    '<div class="footer-section"><h4>Costs Not Included</h4><ul><li>CGC: ~$20-30 / PSA: ~$20-50</li><li>Shipping: ~$10-15 round trip</li><li>eBay fees: ~13%</li></ul></div>'+
    '<div class="footer-section"><h4>Grades Tracked</h4><p>'+(allGrades.size>0?Array.from(allGrades).sort().join(', '):'Scan to populate')+'</p></div></div></div>';
}
