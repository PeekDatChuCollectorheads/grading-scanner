<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grading Arbitrage Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #00e5a0;
    --accent-dim: #00e5a033;
    --red: #ff4466;
    --red-dim: #ff446633;
    --yellow: #ffcc00;
    --yellow-dim: #ffcc0033;
    --blue: #4488ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    font-size: 13px;
  }

  .header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
  }

  .header .subtitle {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .controls {
    padding: 16px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .control-group label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
  }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    min-width: 160px;
  }

  select:focus { border-color: var(--accent); }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    padding: 9px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); }

  .status-bar {
    padding: 10px 24px;
    font-size: 11px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    width: 200px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
    width: 0%;
  }

  .results { padding: 16px 24px; }
  .card-grid { display: grid; gap: 2px; }

  .section-header {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 16px 0 8px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .section-header.psa-header { color: var(--blue); }

  .card-row {
    display: grid;
    grid-template-columns: 32px 60px 1fr 90px 100px 100px 80px 80px;
    align-items: center;
    padding: 10px 12px;
    background: var(--surface);
    border-left: 3px solid transparent;
    transition: background 0.1s;
    gap: 8px;
  }

  .card-row:hover { background: var(--surface2); }
  .card-row.tier-s { border-left-color: var(--accent); }
  .card-row.tier-a { border-left-color: var(--blue); }
  .card-row.tier-b { border-left-color: var(--yellow); }
  .card-row.tier-c { border-left-color: var(--text-dim); }
  .card-row.tier-avoid { border-left-color: var(--red); }

  .card-row-header {
    display: grid;
    grid-template-columns: 32px 60px 1fr 90px 100px 100px 80px 80px;
    padding: 8px 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .rank { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text-dim); }
  .card-img { width: 48px; height: 67px; border-radius: 3px; object-fit: cover; background: var(--surface2); }
  .card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; line-height: 1.2; }
  .card-meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .price { font-weight: 700; }
  .spread-positive { color: var(--accent); font-weight: 700; }
  .spread-negative { color: var(--red); font-weight: 700; }
  .spread-neutral { color: var(--yellow); font-weight: 700; }
  .confidence-high { color: var(--accent); }
  .confidence-medium { color: var(--yellow); }
  .confidence-low { color: var(--red); }

  .tag {
    font-size: 9px; padding: 2px 6px; border-radius: 2px;
    text-transform: uppercase; letter-spacing: 0.5px;
    font-family: 'Syne', sans-serif; font-weight: 600; display: inline-block;
  }
  .tag-sir { background: var(--accent-dim); color: var(--accent); }
  .tag-ir { background: var(--yellow-dim); color: var(--yellow); }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }

  .summary-card {
    background: var(--surface);
    padding: 14px 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .summary-card .label {
    font-family: 'Syne', sans-serif; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 4px;
  }
  .summary-card .value { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; }
  .summary-card .detail { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  .footer-notes { padding: 20px 24px; border-top: 1px solid var(--border); margin-top: 8px; }
  .footer-notes h3 {
    font-family: 'Syne', sans-serif; font-size: 12px;
    text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 10px;
  }
  .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .footer-section {
    background: var(--surface); padding: 14px 16px; border-radius: 4px; border: 1px solid var(--border);
  }
  .footer-section h4 {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); margin-bottom: 8px;
  }
  .footer-section p, .footer-section li { font-size: 11px; color: var(--text-dim); line-height: 1.6; }
  .footer-section ul { list-style: none; padding: 0; }
  .footer-section ul li::before { content: ">"; color: var(--accent); margin-right: 6px; font-weight: 700; }

  .empty-state { text-align: center; padding: 80px 24px; color: var(--text-dim); }
  .empty-state h2 {
    font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--text); margin-bottom: 8px;
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.6s linear infinite;
    margin-right: 6px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: var(--red); }

  @media (max-width: 900px) {
    .card-row, .card-row-header {
      grid-template-columns: 28px 1fr 70px 80px 70px;
    }
    .card-row .card-img-cell, .card-row-header .col-img,
    .card-row .col-confidence, .card-row-header .col-confidence-h,
    .card-row .col-sales, .card-row-header .col-sales-h { display: none; }
  }

  @media (max-width: 600px) {
    .header h1 { font-size: 24px; }
    .controls { flex-direction: column; }
    select { min-width: 100%; }
    .card-row, .card-row-header {
      grid-template-columns: 28px 1fr 65px 60px;
      font-size: 11px;
    }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Grading Arbitrage Scanner</h1>
  <div class="subtitle">Raw NM vs Graded 10 // Spread Analysis</div>
</div>

<div class="controls">
  <div class="control-group">
    <label>TCG</label>
    <select id="tcgSelect">
      <option value="pokemon">Pokemon</option>
    </select>
  </div>
  <div class="control-group">
    <label>Set</label>
    <select id="setSelect">
      <option value="">Select a set</option>
    </select>
  </div>
  <div class="control-group">
    <label>Grader</label>
    <select id="graderSelect">
      <option value="cgc">CGC</option>
      <option value="psa">PSA</option>
      <option value="both">Both</option>
    </select>
  </div>
  <button class="btn btn-primary" id="scanBtn" onclick="scanSelected()">Scan Set</button>
  <button class="btn btn-secondary" id="scanAllBtn" onclick="scanAll()">Scan All</button>
</div>

<div class="status-bar" id="statusBar" style="display:none;">
  <span id="statusText"><span class="spinner"></span> Scanning...</span>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div id="summaryArea"></div>
<div id="resultsArea">
  <div class="empty-state">
    <h2>Select a Set and Scan</h2>
    <p>Compare raw NM market price vs graded 10 sold price</p>
    <p style="margin-top:8px; font-size:11px;">Select grader: CGC, PSA, or Both</p>
  </div>
</div>
<div id="footerArea"></div>

<script>
const API_BASE = 'https://pkm-proxy.collectorheadscollectibles.workers.dev/api/v2';

const SETS = {
  "Scarlet & Violet 151": {
    searchName: "151",
    cards: {
      "166/165": { name: "Bulbasaur", rarity: "IR" },
      "167/165": { name: "Ivysaur", rarity: "IR" },
      "168/165": { name: "Charmander", rarity: "IR" },
      "169/165": { name: "Charmeleon", rarity: "IR" },
      "170/165": { name: "Squirtle", rarity: "IR" },
      "171/165": { name: "Wartortle", rarity: "IR" },
      "172/165": { name: "Caterpie", rarity: "IR" },
      "173/165": { name: "Pikachu", rarity: "IR" },
      "174/165": { name: "Nidoking", rarity: "IR" },
      "175/165": { name: "Psyduck", rarity: "IR" },
      "176/165": { name: "Poliwhirl", rarity: "IR" },
      "177/165": { name: "Machoke", rarity: "IR" },
      "178/165": { name: "Tangela", rarity: "IR" },
      "179/165": { name: "Mr. Mime", rarity: "IR" },
      "180/165": { name: "Omanyte", rarity: "IR" },
      "181/165": { name: "Dragonair", rarity: "IR" },
      "198/165": { name: "Venusaur ex", rarity: "SIR" },
      "199/165": { name: "Charizard ex", rarity: "SIR" },
      "200/165": { name: "Blastoise ex", rarity: "SIR" },
      "201/165": { name: "Alakazam ex", rarity: "SIR" },
      "202/165": { name: "Zapdos ex", rarity: "SIR" }
    }
  }
};

// Populate set dropdown
const setSelect = document.getElementById('setSelect');
Object.keys(SETS).forEach(name => {
  const opt = document.createElement('option');
  opt.value = name;
  opt.textContent = name;
  setSelect.appendChild(opt);
});

// ── API Call ──
async function apiCall(endpoint, params) {
  const queryStr = Object.entries(params)
    .map(([k, v]) => k + '=' + encodeURIComponent(v))
    .join('&');
  const fullUrl = API_BASE + endpoint + '?' + queryStr;
  console.log('Fetching:', fullUrl);
  try {
    const resp = await fetch(fullUrl);
    const text = await resp.text();
    if (!resp.ok) throw new Error('API error ' + resp.status + ': ' + text.substring(0, 200));
    return JSON.parse(text);
  } catch (err) {
    console.error('apiCall failed for', fullUrl, err);
    throw err;
  }
}

// ── Status ──
function showStatus(text, progress) {
  const bar = document.getElementById('statusBar');
  bar.style.display = 'flex';
  document.getElementById('statusText').innerHTML = '<span class="spinner"></span> ' + text;
  if (progress !== undefined) document.getElementById('progressFill').style.width = progress + '%';
}
function hideStatus() { document.getElementById('statusBar').style.display = 'none'; }
function showError(msg) {
  document.getElementById('statusBar').style.display = 'flex';
  document.getElementById('statusText').innerHTML = '<span class="error">' + msg + '</span>';
}

// ── Graded Price Helpers ──
function getGradedPrice(gradeData) {
  if (!gradeData) return null;
  if (gradeData.smartMarketPrice && gradeData.smartMarketPrice.price != null && gradeData.smartMarketPrice.daysUsed === 30) {
    return gradeData.smartMarketPrice.price;
  }
  return gradeData.medianPrice ?? gradeData.averagePrice ?? null;
}

function getGradedMethod(gradeData) {
  if (!gradeData) return 'none';
  if (gradeData.smartMarketPrice && gradeData.smartMarketPrice.price != null && gradeData.smartMarketPrice.daysUsed === 30) {
    return 'smartMarketPrice30Day';
  }
  if (gradeData.medianPrice != null) return 'medianPrice';
  if (gradeData.averagePrice != null) return 'averagePrice';
  return 'none';
}

function getConfidence(gradeData) {
  if (!gradeData) return null;
  if (gradeData.smartMarketPrice && gradeData.smartMarketPrice.price != null && gradeData.smartMarketPrice.daysUsed === 30) {
    return gradeData.smartMarketPrice.confidence || null;
  }
  return null;
}

// ── Scan Logic ──
async function scanSet(setName) {
  const setData = SETS[setName];
  const cardEntries = Object.entries(setData.cards);
  const results = [];
  const batchSize = 5;

  for (let i = 0; i < cardEntries.length; i += batchSize) {
    const batch = cardEntries.slice(i, i + batchSize);
    showStatus(
      setName + ': Scanning ' + Math.min(i + batchSize, cardEntries.length) + '/' + cardEntries.length,
      Math.round((i / cardEntries.length) * 100)
    );

    const promises = batch.map(async ([cardNum, info]) => {
      try {
        const data = await apiCall('/cards', {
          search: info.name + ' ' + cardNum,
          set: setData.searchName,
          includeEbay: 'true',
          days: '90',
          limit: '5'
        });

        let card = null;
        if (!data || !data.data) {
          return { name: info.name, cardNumber: cardNum, rarity: info.rarity, setName, rawNM: null, cgc10: null, psa10: null, error: 'No data' };
        }

        if (Array.isArray(data.data)) {
          card = data.data.find(c => c.cardNumber === cardNum);
          if (!card) card = data.data.find(c => c.cardNumber && c.cardNumber.startsWith(cardNum.split('/')[0]));
          if (!card && data.data.length > 0) card = data.data[0];
        } else {
          card = data.data;
        }

        if (!card) {
          return { name: info.name, cardNumber: cardNum, rarity: info.rarity, setName, rawNM: null, cgc10: null, psa10: null, error: 'Not found' };
        }

        const rawNM = card.prices?.market ?? null;
        const grades = card.ebay?.salesByGrade;

        // CGC 10
        const cgc10Data = grades?.cgc10 || null;
        const cgc10 = getGradedPrice(cgc10Data);
        const cgc10Confidence = getConfidence(cgc10Data);
        const cgc10Sales = cgc10Data?.count || 0;

        // PSA 10
        const psa10Data = grades?.psa10 || null;
        const psa10 = getGradedPrice(psa10Data);
        const psa10Confidence = getConfidence(psa10Data);
        const psa10Sales = psa10Data?.count || 0;

        // Spreads
        let cgcSpread = null, cgcSpreadPct = null;
        if (rawNM && cgc10) {
          cgcSpread = cgc10 - rawNM;
          cgcSpreadPct = ((cgc10 - rawNM) / rawNM) * 100;
        }

        let psaSpread = null, psaSpreadPct = null;
        if (rawNM && psa10) {
          psaSpread = psa10 - rawNM;
          psaSpreadPct = ((psa10 - rawNM) / rawNM) * 100;
        }

        return {
          name: info.name,
          cardNumber: cardNum,
          rarity: info.rarity,
          setName: setName,
          rawNM: rawNM,
          image: card.imageCdnUrl200 || card.imageCdnUrl400 || null,
          // CGC
          cgc10, cgcSpread, cgcSpreadPct, cgc10Confidence, cgc10Sales,
          // PSA
          psa10, psaSpread, psaSpreadPct, psa10Confidence, psa10Sales,
          // Meta
          ebayGrades: grades ? Object.keys(grades) : [],
        };
      } catch (err) {
        console.error('Error fetching ' + info.name + ':', err);
        return {
          name: info.name, cardNumber: cardNum, rarity: info.rarity, setName,
          rawNM: null, cgc10: null, psa10: null, error: err.message
        };
      }
    });

    const batchResults = await Promise.all(promises);
    results.push(...batchResults.filter(r => r !== null));
    if (i + batchSize < cardEntries.length) await new Promise(r => setTimeout(r, 500));
  }
  return results;
}

async function scanSelected() {
  const setName = setSelect.value;
  if (!setName) { alert('Select a set'); return; }
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('scanAllBtn').disabled = true;
  try {
    const results = await scanSet(setName);
    showStatus('Complete: ' + results.length + ' cards scanned', 100);
    setTimeout(hideStatus, 2000);
    renderResults(results);
  } catch (err) { showError('Scan failed: ' + err.message); }
  finally {
    document.getElementById('scanBtn').disabled = false;
    document.getElementById('scanAllBtn').disabled = false;
  }
}

async function scanAll() {
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('scanAllBtn').disabled = true;
  const allResults = [];
  try {
    for (const setName of Object.keys(SETS)) {
      const results = await scanSet(setName);
      allResults.push(...results);
    }
    showStatus('Complete: ' + allResults.length + ' cards', 100);
    setTimeout(hideStatus, 2000);
    renderResults(allResults);
  } catch (err) { showError('Scan failed: ' + err.message); }
  finally {
    document.getElementById('scanBtn').disabled = false;
    document.getElementById('scanAllBtn').disabled = false;
  }
}

// ── Render ──
function getTier(spreadPct) {
  if (spreadPct === null) return 'tier-c';
  if (spreadPct >= 100) return 'tier-s';
  if (spreadPct >= 50) return 'tier-a';
  if (spreadPct >= 20) return 'tier-b';
  if (spreadPct >= 0) return 'tier-c';
  return 'tier-avoid';
}

function renderCardRow(r, i, graderKey) {
  const graded = graderKey === 'psa' ? r.psa10 : r.cgc10;
  const spread = graderKey === 'psa' ? r.psaSpread : r.cgcSpread;
  const spreadPct = graderKey === 'psa' ? r.psaSpreadPct : r.cgcSpreadPct;
  const confidence = graderKey === 'psa' ? r.psa10Confidence : r.cgc10Confidence;
  const sales = graderKey === 'psa' ? r.psa10Sales : r.cgc10Sales;
  const gradeLabel = graderKey === 'psa' ? 'PSA 10' : 'CGC 10';

  const tier = getTier(spreadPct);
  const spreadStr = spreadPct !== null ? (spreadPct > 0 ? '+' : '') + spreadPct.toFixed(1) + '%' : 'N/A';
  const spreadClass = spreadPct === null ? '' : spreadPct >= 50 ? 'spread-positive' : spreadPct >= 0 ? 'spread-neutral' : 'spread-negative';
  const spreadDollar = spread !== null ? '$' + Math.abs(spread).toFixed(0) : '';

  return '<div class="card-row ' + tier + '">' +
    '<div class="rank">' + (i + 1) + '</div>' +
    '<div class="card-img-cell">' +
      (r.image ? '<img class="card-img" src="' + r.image + '" alt="' + r.name + '" loading="lazy">' : '<div class="card-img"></div>') +
    '</div>' +
    '<div>' +
      '<div class="card-name">' + r.name + '</div>' +
      '<div class="card-meta">' + r.cardNumber + ' &middot; <span class="tag ' + (r.rarity === 'SIR' ? 'tag-sir' : 'tag-ir') + '">' + r.rarity + '</span></div>' +
    '</div>' +
    '<div class="price">' + (r.rawNM ? '$' + r.rawNM.toFixed(2) : '<span class="error">N/A</span>') + '</div>' +
    '<div class="price">' + (graded ? '$' + graded.toFixed(2) : '<span style="color:var(--text-dim)">No data</span>') + '</div>' +
    '<div><span class="' + spreadClass + '">' + spreadStr + '</span>' +
      (spreadDollar ? '<br><span style="font-size:10px;color:var(--text-dim)">' + spreadDollar + '</span>' : '') +
    '</div>' +
    '<div class="col-confidence">' +
      (confidence ? '<span class="confidence-' + confidence + '">' + confidence + '</span>' : '<span style="color:var(--text-dim)">--</span>') +
    '</div>' +
    '<div class="col-sales">' + (sales > 0 ? sales : '<span style="color:var(--text-dim)">0</span>') + '</div>' +
  '</div>';
}

function renderTableHeader(gradeLabel) {
  return '<div class="card-row-header">' +
    '<div>#</div><div class="col-img"></div><div>Card</div>' +
    '<div>Raw NM</div><div>' + gradeLabel + '</div><div>Spread</div>' +
    '<div class="col-confidence-h">Conf.</div><div class="col-sales-h">Sales</div>' +
  '</div>';
}

function renderResults(results) {
  const grader = document.getElementById('graderSelect').value;

  // Sort helper
  function sortBySpread(arr, key) {
    return [...arr].sort((a, b) => {
      const aVal = key === 'psa' ? a.psaSpreadPct : a.cgcSpreadPct;
      const bVal = key === 'psa' ? b.psaSpreadPct : b.cgcSpreadPct;
      if (aVal === null && bVal === null) return 0;
      if (aVal === null) return 1;
      if (bVal === null) return -1;
      return bVal - aVal;
    });
  }

  // Summary stats helper
  function calcStats(arr, key) {
    const withData = arr.filter(r => (key === 'psa' ? r.psaSpreadPct : r.cgcSpreadPct) !== null);
    const avg = withData.length ? withData.reduce((s, r) => s + (key === 'psa' ? r.psaSpreadPct : r.cgcSpreadPct), 0) / withData.length : 0;
    const top = withData.length ? withData.reduce((best, r) => {
      const pct = key === 'psa' ? r.psaSpreadPct : r.cgcSpreadPct;
      return pct > (key === 'psa' ? best.psaSpreadPct : best.cgcSpreadPct) ? r : best;
    }) : null;
    const noData = arr.filter(r => (key === 'psa' ? r.psa10 : r.cgc10) === null);
    return { total: arr.length, withData: withData.length, avg, top, noData: noData.length };
  }

  let html = '';

  if (grader === 'cgc' || grader === 'both') {
    const sorted = sortBySpread(results, 'cgc');
    const stats = calcStats(results, 'cgc');
    const topName = stats.top ? stats.top.name : 'N/A';
    const topPct = stats.top ? '+' + (stats.top.cgcSpreadPct).toFixed(1) + '%' : '';

    // Summary
    document.getElementById('summaryArea').innerHTML = renderSummary(stats, topName, topPct, grader === 'both' ? 'CGC 10' : null);

    html += '<div class="results">';
    if (grader === 'both') html += '<div class="section-header">CGC 10 Spread</div>';
    html += renderTableHeader('CGC 10');
    html += '<div class="card-grid">';
    sorted.forEach((r, i) => { html += renderCardRow(r, i, 'cgc'); });
    html += '</div>';

    if (grader === 'both') {
      const psaSorted = sortBySpread(results, 'psa');
      const psaStats = calcStats(results, 'psa');
      html += '<div class="section-header psa-header" style="margin-top:24px;">PSA 10 Spread</div>';
      html += renderTableHeader('PSA 10');
      html += '<div class="card-grid">';
      psaSorted.forEach((r, i) => { html += renderCardRow(r, i, 'psa'); });
      html += '</div>';

      // Append PSA summary below CGC summary
      document.getElementById('summaryArea').innerHTML += renderSummary(psaStats,
        psaStats.top ? psaStats.top.name : 'N/A',
        psaStats.top ? '+' + psaStats.top.psaSpreadPct.toFixed(1) + '%' : '',
        'PSA 10'
      );
    }

    html += '</div>';
  } else if (grader === 'psa') {
    const sorted = sortBySpread(results, 'psa');
    const stats = calcStats(results, 'psa');
    const topName = stats.top ? stats.top.name : 'N/A';
    const topPct = stats.top ? '+' + (stats.top.psaSpreadPct).toFixed(1) + '%' : '';

    document.getElementById('summaryArea').innerHTML = renderSummary(stats, topName, topPct, null);

    html += '<div class="results">';
    html += renderTableHeader('PSA 10');
    html += '<div class="card-grid">';
    sorted.forEach((r, i) => { html += renderCardRow(r, i, 'psa'); });
    html += '</div></div>';
  }

  document.getElementById('resultsArea').innerHTML = html;
  renderFooter(results);
}

function renderSummary(stats, topName, topPct, label) {
  const prefix = label ? '<div style="font-family:Syne,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);padding:16px 24px 0;">' + label + '</div>' : '';
  return prefix + '<div class="summary-bar">' +
    '<div class="summary-card"><div class="label">Cards Scanned</div><div class="value">' + stats.total + '</div>' +
      '<div class="detail">' + stats.withData + ' with graded data</div></div>' +
    '<div class="summary-card"><div class="label">Avg Spread</div>' +
      '<div class="value" style="color:' + (stats.avg > 0 ? 'var(--accent)' : 'var(--red)') + '">' +
      (stats.avg > 0 ? '+' : '') + stats.avg.toFixed(1) + '%</div>' +
      '<div class="detail">Raw NM to Graded 10</div></div>' +
    '<div class="summary-card"><div class="label">Top Opportunity</div>' +
      '<div class="value" style="color:var(--accent)">' + topName + '</div>' +
      '<div class="detail">' + topPct + ' spread</div></div>' +
    '<div class="summary-card"><div class="label">No Graded Data</div>' +
      '<div class="value" style="color:' + (stats.noData > 0 ? 'var(--yellow)' : 'var(--text-dim)') + '">' + stats.noData + '</div>' +
      '<div class="detail">' + (stats.noData > 0 ? 'Insufficient sales data' : 'All cards have data') + '</div></div>' +
  '</div>';
}

function renderFooter(results) {
  const allGrades = new Set();
  results.forEach(r => { if (r.ebayGrades) r.ebayGrades.forEach(g => allGrades.add(g)); });

  document.getElementById('footerArea').innerHTML =
    '<div class="footer-notes"><h3>Scan Analysis</h3><div class="footer-grid">' +
    '<div class="footer-section"><h4>Tier Legend</h4><ul>' +
      '<li><span style="color:var(--accent)">S Tier</span> = 100%+ spread</li>' +
      '<li><span style="color:var(--blue)">A Tier</span> = 50-99% spread</li>' +
      '<li><span style="color:var(--yellow)">B Tier</span> = 20-49% spread</li>' +
      '<li><span style="color:var(--text-dim)">C Tier</span> = 0-19% spread</li>' +
      '<li><span style="color:var(--red)">Avoid</span> = negative spread</li>' +
    '</ul></div>' +
    '<div class="footer-section"><h4>Data Quality</h4><ul>' +
      '<li>Graded 10 prices from eBay sold data (90 day window)</li>' +
      '<li>Uses 30-day smart price first, then median, then average</li>' +
      '<li>Raw NM = TCGPlayer market price</li>' +
    '</ul></div>' +
    '<div class="footer-section"><h4>Grading Costs Not Included</h4><ul>' +
      '<li>CGC standard: ~$20-30/card</li>' +
      '<li>PSA standard: ~$20-50/card</li>' +
      '<li>Shipping to/from grader: ~$10-15</li>' +
      '<li>eBay selling fees: ~13%</li>' +
    '</ul></div>' +
    '<div class="footer-section"><h4>Available Grades in Data</h4>' +
      '<p>' + (allGrades.size > 0 ? Array.from(allGrades).sort().join(', ') : 'Grades populate after scan') + '</p>' +
    '</div></div></div>';
}
</script>
</body>
</html>
